id: summarize
name: summarize
description: Produces a concise summary of the provided text. Use for condensing long documents, logs, articles, or any block of text into key points.
icon: "📝"
version: "1.1"
tags:
  - text
compatible_runners:
  - ollama
  - groq
  - huggingface
  - together
  - openrouter
input_schema:
  type: object
  properties:
    text:
      type: string
      description: The text to summarize
  required: [text]
output_schema:
  type: object
  properties:
    summary:
      type: string
system_prompt: |
  You are a helpful assistant. Summarize the provided text concisely, preserving key facts and conclusions. Aim for 1-3 sentences unless the content demands more.
